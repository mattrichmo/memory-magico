<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="Memory Magico static dashboard for a Git-based agentic memory harness." />
    <title>Memory Magico Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />

  <body>
    <div id="app" class="boot-shell">
      <div class="boot-card">
        <div class="boot-title">MEMORY MAGICO</div>
        <div class="boot-subtitle">memory cockpit</div>
        <div class="boot-line"></div>
        <div class="boot-status">loading dashboard snapshot...</div>
      </div>
    </div>
    <noscript>
      <style>#app{display:none}</style>
      <main class="noscript-panel">
        <h1>JavaScript is required</h1>
        <p>The static dashboard needs JavaScript to fetch the local Memory Magico API and render project memory.</p>
      </main>
    </noscript>
    <script defer src="./app.js"></script>
  </body>
</html>
